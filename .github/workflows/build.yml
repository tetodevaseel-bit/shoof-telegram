name: Build Shoof TV APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;21.4.7075529"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - run: chmod +x gradlew

      - name: Build APK (App variant only)
        run: ./gradlew :TMessagesProj_App:assembleAfatDebug --no-daemon --build-cache
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - uses: actions/upload-artifact@v4
        with:
          name: shoof-tv-apk
          path: TMessagesProj_App/build/outputs/apk/**/*.apk
          retention-days: 30
