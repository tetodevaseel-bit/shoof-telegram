name: Build Shoof V4 APK

on:
  push:
    branches: [ shoof-v4 ]
  workflow_dispatch:
    inputs:
      branch:
        default: shoof-v4

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: shoof-v4
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Setup NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;21.4.7075529"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/21.4.7075529" >> $GITHUB_ENV
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v4-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-v4-
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-v4-${{ github.sha }}
          restore-keys: ${{ runner.os }}-ccache-v4-
      - name: Setup ccache
        run: |
          sudo apt-get install -y ccache
          ccache --max-size=2G
          echo "NDK_CCACHE=ccache" >> $GITHUB_ENV
      - run: chmod +x gradlew
      - name: Build APK
        run: ./gradlew :TMessagesProj_App:assembleAfatDebug --no-daemon --build-cache
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          NDK_CCACHE: ccache
      - uses: actions/upload-artifact@v4
        with:
          name: shoof-v4-apk
          path: TMessagesProj_App/build/outputs/apk/**/*.apk
          retention-days: 30
